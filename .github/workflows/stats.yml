name: Generate Stats Images

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  overview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: u-stem
          filename: generated/overview.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Tokyo
          committer_branch: master
          committer_message: "chore: update overview metrics"

  languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: u-stem
          filename: generated/languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          config_timezone: Asia/Tokyo
          committer_branch: master
          committer_message: "chore: update languages metrics"
