name: Update Profile

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: u-stem
          outputs: |
            dist/snake.svg?palette=github
            dist/snake-dark.svg?palette=github-dark

      - run: |
          cp dist/snake.svg snake.svg
          cp dist/snake-dark.svg snake-dark.svg

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update snake animation SVGs"
          file_pattern: "snake.svg snake-dark.svg"
